<script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>
<script src="script.js"></script>

<script>
$(document).ready(() => {
    const max_h = 33;
    const max_p = 300;
    let tot; let
str;
    $('h2.lighter').each(function () {
    str = String($(this).html());
    tot = str.length;
    str = (tot <= max_h)
    ? str
    : `${str.substring(0, (max_h + 1))}...`;
    $(this).html(str);
    });
    $('p.lighter').each(function () {
    str = String($(this).html());
    tot = str.length;
    str = (tot <= max_p)
    ? str
    : `${str.substring(0, (max_p + 1))}...`;
    $(this).html(str);
    });
});
</script>
